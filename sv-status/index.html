<html>
<head>
    <title>SV Status Monitor</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { text-align: center; color: #333; }
        h2 { color: #555; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .sv { padding: 12px; border-radius: 6px; margin-bottom: 8px; font-weight: bold; color: white; }
        .healthy { background: #4CAF50; }
        .lagging { background: #f44336; }
    </style>
</head>
<body>
    <h1>SV Status Monitor</h1>
    <div id="app">Loading...</div>
    <script>
        const urls = {
            dev: 'https://info.sv.dev.global.canton.network.sv-nodeops.com/runtime/status.json',
            test: 'https://info.sv.test.global.canton.network.sv-nodeops.com/runtime/status.json',
            main: 'https://info.sv.global.canton.network.sv-nodeops.com/runtime/status.json'
        };

        async function load() {
            const results = [];
            for (const [env, url] of Object.entries(urls)) {
                try {
                    const resp = await fetch(url);
                    const data = await resp.json();
                    results.push({ env, data });
                } catch (e) {
                    // ignore failed fetch
                }
            }
            if (results.length === 0) {
                document.getElementById('app').innerHTML = 'No data available';
                return;
            }
            document.getElementById('app').innerHTML = results.map(r => {
                const svList = Object.entries(r.data.status.sv)
                    .map(([n, s]) => {
                        const cls = s === 0 ? 'healthy' : 'lagging';
                        const label = s === 0 ? 'Healthy' : 'Lagging';
                        return `<div class="sv ${cls}">${n}: ${label}</div>`;
                    })
                    .join('');
                return `<h2>${r.env}</h2>` + svList;
            }).join('');
        }

        load();
    </script>
</body>
</html>
