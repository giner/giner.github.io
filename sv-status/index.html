<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SV Status Monitor</title>
    <style>
        body { font-family: Arial; padding: 10px; }
        #app { display: flex; flex-wrap: wrap; gap: 40px; overflow-x: auto; }
        h1 { color: #333; }
        h2 { color: #555; border-bottom: 1px solid #ddd; margin-top: 20px; }
        .env { display: inline-block; vertical-align: top; }
        table { border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; white-space: nowrap; text-align: center; }
        th { background: #f5f5f5; font-weight: bold; }
        .name-col { min-width: 150px; text-align: left; }
        .ok { color: #4CAF50; font-weight: bold; }
        .bad { color: #f44336; font-weight: bold; }
        .na { color: #999; }
        .stale-env { opacity: 0.7; }
        .stale-env h2::after { content: ' (STALE)'; color: #f44336; }
        @media (max-width: 600px) { body, table, th, td { font-size: 12px; } }
        @media (max-width: 800px) { body, table, th, td { font-size: 14px; } }
    </style>
</head>
<body>
    <h1>SV Status Monitor</h1>
    <div id="app">Loading...</div>
    <script>
        const urls = {
            dev: 'https://info.sv.dev.global.canton.network.sv-nodeops.com/runtime/status.json',
            test: 'https://info.sv.test.global.canton.network.sv-nodeops.com/runtime/status.json',
            main: 'https://info.sv.global.canton.network.sv-nodeops.com/runtime/status.json',
        };

        async function fetchEnv([env, url]) {
            try {
                const res = await fetch(url);
                const lastModified = res.headers.get('last-modified');
                const json = await res.json();
                const generatedAt = json.generated_at || (lastModified && new Date(lastModified));
                const stale = generatedAt && Date.now() - generatedAt > 90000;
                return { env, status: json.status, stale, ok: true };
            } catch {
                return { env, ok: false };
            }
        }

        function renderTable(components, svs, status) {
            const cols = components.map(c => `<th>${c.toUpperCase()}</th>`).join('');
            const rows = svs.map(sv => {
                const cells = components.map(c => {
                    const v = status[c]?.[sv];
                    const cls = v === 0 ? 'ok' : v === undefined ? 'na' : 'bad';
                    const label = v === 0 ? 'OK' : v === undefined ? 'N/A' : 'BAD';
                    return `<td><span class="${cls}">${label}</span></td>`;
                }).join('');
                return `<tr><td class="name-col">${sv}</td>${cells}</tr>`;
            }).join('');
            return `<table><tr><th class="name-col">Name</th>${cols}</tr>${rows}</table>`;
        }

        function renderEnv({ env, status, stale }) {
            const components = Object.keys(status).sort();
            const svs = [...new Set(components.flatMap(c => Object.keys(status[c])))].sort(
                (a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' })
            );
            const cls = stale ? ' stale-env' : '';
            return `<div class="env${cls}"><h2>${env}</h2>${renderTable(components, svs, status)}</div>`;
        }

        async function load() {
            const results = await Promise.all(Object.entries(urls).map(fetchEnv));
            const html = results.map(r => r.ok ? renderEnv(r) : `<div class="env"><h2>${r.env}</h2>No data available</div>`).join('');
            document.getElementById('app').innerHTML = html;
        }

        load();
        setInterval(() => Date.now() - load.last > 10000 && load(), 1000);
        load.last = Date.now();
    </script>
</body>
</html>
