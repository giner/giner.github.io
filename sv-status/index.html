<html>
<head>
    <title>SV Status Monitor</title>
    <style>
        body { font-family: Arial; width: 100vw; padding: 20px; box-sizing: border-box; }
        h1, h2 { padding-bottom: 5px; }
        h1 { text-align: center; color: #333; }
        h2 { color: #555; border-bottom: 1px solid #ddd; }
        #app { display: flex; flex-wrap: wrap; justify-content: center; }
        .env { width: 500px; margin: 0 10px; }
        .sv { display: flex; justify-content: space-between; padding: 12px; border-radius: 6px; margin-bottom: 8px; font-weight: bold; color: white; }
        .healthy { background: #4CAF50; }
        .lagging { background: #f44336; }
    </style>
</head>
<body>
    <h1>SV Status Monitor</h1>
    <div id="app">Loading...</div>
    <script>
        const urls = {
            dev: 'https://info.sv.dev.global.canton.network.sv-nodeops.com/runtime/status.json',
            test: 'https://info.sv.test.global.canton.network.sv-nodeops.com/runtime/status.json',
            main: 'https://info.sv.global.canton.network.sv-nodeops.com/runtime/status.json'
        };

        async function load() {
            const results = [];
            for (const [env, url] of Object.entries(urls)) {
                try {
                    const resp = await fetch(url);
                    const data = await resp.json();
                    results.push({ env, data });
                } catch (e) {
                    // ignore failed fetch
                }
            }
            if (results.length === 0) {
                document.getElementById('app').innerHTML = 'No data available';
                return;
            }
            document.getElementById('app').innerHTML = results.map(r => {
                const svList = Object.entries(r.data.status.sv)
                    .map(([n, s]) => {
                        const cls = s === 0 ? 'healthy' : 'lagging';
                        const label = s === 0 ? 'Healthy' : 'Lagging';
                        return `<div class="sv ${cls}"><span>${n}</span><span>${label}</span></div>`;
                    })
                    .join('');
                return `<div class="env"><h2>${r.env}</h2>` + svList + `</div>`;
            }).join('');
        }

        load();
        setInterval(load, 60000);
    </script>
</body>
</html>
